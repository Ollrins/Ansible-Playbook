---
- name: Install Clickhouse
  hosts: clickhouse
  vars:
    clickhouse_arch_map:
      clickhouse-client: "noarch"
      clickhouse-server: "noarch"
      clickhouse-common-static: "x86_64"
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:
    - name: Get clickhouse distrib
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.{{ clickhouse_arch_map[item] }}.rpm"
        dest: "./{{ item }}-{{ clickhouse_version }}.rpm"
        mode: "0644"
      loop: "{{ clickhouse_packages }}"

    - name: Install clickhouse packages
      become: true
      ansible.builtin.dnf:
        name:
          - "./clickhouse-common-static-{{ clickhouse_version }}.rpm"
          - "./clickhouse-client-{{ clickhouse_version }}.rpm"
          - "./clickhouse-server-{{ clickhouse_version }}.rpm"
        disable_gpg_check: true
        state: present
      notify: Start clickhouse service

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Wait for clickhouse server to start
      become: true
      ansible.builtin.wait_for:
        port: 8123
        host: localhost
        delay: 5
        timeout: 30
        state: started

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: (create_db.rc != 0) and (create_db.rc != 82)
      changed_when: create_db.rc == 0

- name: Install Vector
  hosts: clickhouse
  vars:
    vector_version: "0.21.0"
    vector_install_dir: "/opt/vector"
    vector_config_dir: "/etc/vector"
  handlers:
    - name: Restart vector service
      become: true
      ansible.builtin.systemd:
        name: vector
        state: restarted
        daemon_reload: true
  tasks:
    - name: Create vector directories
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ vector_install_dir }}"
        - "{{ vector_config_dir }}"

    - name: Download vector archive
      ansible.builtin.get_url:
        url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "/tmp/vector-{{ vector_version }}.tar.gz"
        mode: "0644"

    - name: Extract vector archive
      become: true
      ansible.builtin.unarchive:
        src: "/tmp/vector-{{ vector_version }}.tar.gz"
        dest: "{{ vector_install_dir }}"
        remote_src: true
        extra_opts: [--strip-components=1]
        mode: "0755"
        creates: "{{ vector_install_dir }}/bin/vector"

    - name: Deploy vector config
      become: true
      ansible.builtin.template:
        src: templates/vector.yml.j2
        dest: "{{ vector_config_dir }}/vector.yml"
        mode: "0644"

    - name: Create vector systemd service file
      become: true
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Vector Service
          After=network-online.target
          [Service]
          Type=simple
          ExecStart={{ vector_install_dir }}/bin/vector --config {{ vector_config_dir }}/vector.yml
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/vector.service
        mode: "0644"

    - name: Reload systemd and start vector
      become: true
      ansible.builtin.systemd:
        name: vector
        state: started
        enabled: true
        daemon_reload: true
